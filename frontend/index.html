<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foto Decider</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body x-data="fotoDecider()" x-init="init()">
  <header>
    <h1>📷 Foto Decider</h1>
    <div class="header-actions">
      <template x-if="!folder">
        <div style="display: flex; gap: 10px; align-items: center;">
          <input 
            type="text" 
            x-model="folderPath" 
            @keydown.enter="loadFolder()" 
            placeholder="Enter folder path..." 
            style="background: var(--bg-lighter); border: 1px solid #333; color: var(--text); padding: 8px 14px; border-radius: 6px; width: 400px; font-size: 13px;"
          >
          <button @click="loadFolder()" :disabled="!folderPath">Load Folder</button>
        </div>
      </template>
      <template x-if="folder">
        <span class="folder-info">
          <span x-text="folder" style="max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
          <button @click="clearFolder()" title="Close folder" style="padding: 4px 8px;">✕</button>
        </span>
      </template>
      <span class="counter" x-text="files.length ? `${currentIndex + 1} / ${files.length}` : 'No images'"></span>
    </div>
    <div class="header-actions" style="margin-left: auto;">
      <button @click="openBash()" :disabled="Object.keys(marks).length === 0">⚡ Bash</button>
      <button @click="clearMarks()" :disabled="Object.keys(marks).length === 0">Clear Marks</button>
    </div>
  </header>

  <div class="preview-container" id="previewContainer">
    <div class="preview-strip" id="previewStrip">
      <template x-for="(file, idx) in files" :key="file.id">
        <div
          class="preview-thumb"
          :class="{
            current: idx === currentIndex,
            marked: marks[file.id] !== undefined,
            deleted: marks[file.id] === 3
          }"
          @click="goTo(idx)"
        >
          <img
            :src="`/api/thumbnail/${encodeURIComponent(file.id)}`"
            :alt="file.name"
            loading="lazy"
          >
          <span class="mark-badge" x-show="marks[file.id] !== undefined" x-text="marks[file.id]"></span>
        </div>
      </template>
    </div>
  </div>

  <main>
    <div
      class="pane"
      :class="{ focused: focusedPane === 1 }"
      data-label="A"
      @click="focusPane(1); if(!pane1File && files.length) loadPane(1)"
      @dragover.prevent="focusPane(1)"
      @drop.prevent="handleDrop($event, 1)"
    >
      <div class="pane-empty" x-show="!pane1File">
        <div class="pane-empty-icon">🖼️</div>
        <div>Click to load image</div>
        <div class="hint">Press 1-9 to mark</div>
      </div>
      <div class="pane-content" x-show="pane1File">
        <img
          :src="pane1File ? `/api/image/${encodeURIComponent(pane1File.id)}` : ''"
          @load="fitImage($event, 1)"
          @wheel.prevent="zoomPane(1, $event)"
          :style="getPaneStyle(1)"
          draggable="false"
        >
      </div>
      <div class="pane-mark" x-show="pane1Mark" x-text="pane1Mark"></div>
      <div class="pane-info" x-text="pane1File?.name || ''"></div>
    </div>

    <div
      class="pane"
      :class="{ focused: focusedPane === 2 }"
      data-label="B"
      @click="focusPane(2); if(!pane2File && files.length) loadPane(2)"
      @dragover.prevent="focusPane(2)"
      @drop.prevent="handleDrop($event, 2)"
    >
      <div class="pane-empty" x-show="!pane2File">
        <div class="pane-empty-icon">🖼️</div>
        <div>Click to load image</div>
        <div class="hint">Press 1-9 to mark</div>
      </div>
      <div class="pane-content" x-show="pane2File">
        <img
          :src="pane2File ? `/api/image/${encodeURIComponent(pane2File.id)}` : ''"
          @load="fitImage($event, 2)"
          @wheel.prevent="zoomPane(2, $event)"
          :style="getPaneStyle(2)"
          draggable="false"
        >
      </div>
      <div class="pane-mark" x-show="pane2Mark" x-text="pane2Mark"></div>
      <div class="pane-info" x-text="pane2File?.name || ''"></div>
    </div>
  </main>

  <footer>
    <div class="marks-legend">
      <template x-for="i in 9" :key="i">
        <div class="mark-item">
          <span class="mark-key" x-text="i"></span>
          <span class="mark-count" x-text="getMarkCount(i)"></span>
        </div>
      </template>
    </div>
    <div class="shortcuts">
      Space: Next | BkSp: Prev | ←→: Pane | +/-: Zoom | 1-9: Mark | Esc: Clear
    </div>
  </footer>

  <!-- Bash Modal -->
  <div class="modal" x-show="showBash" x-transition @click.self="showBash = false">
    <div class="modal-content">
      <h2>⚡ Bash Commands</h2>
      <template x-for="(cmd, mark) in bashCommands" :key="mark">
        <div class="command-group">
          <h3>Mark <span x-text="mark"></span> - <span x-text="markNames[mark]"></span> (<span x-text="bashFiles[mark]?.length || 0"></span> files)</h3>
          <div class="bash-command">
            <code x-text="cmd"></code>
            <button @click="copyCommand(cmd)">Copy</button>
          </div>
        </div>
      </template>
      <template x-if="Object.keys(bashCommands).length === 0">
        <p style="color: var(--text-dim);">No marked files</p>
      </template>
      <button @click="showBash = false" style="width: 100%; margin-top: 20px;">Close</button>
    </div>
  </div>

  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="/static/app.js"></script>
</body>
</html>
