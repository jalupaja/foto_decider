<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foto Decider</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body x-data="fotoDecider()" x-init="init()" @keydown.window="handleKey($event)">
  <header>
    <h1>📷 Foto Decider</h1>
    <div class="header-actions">
      <template x-if="!folder">
        <div style="display: flex; gap: 10px; align-items: center;">
          <input 
            type="text" 
            x-model="folderPath" 
            @keydown.enter="loadFolder()" 
            placeholder="Enter folder path..." 
            style="background: var(--bg-lighter); border: 1px solid #333; color: var(--text); padding: 8px 14px; border-radius: 6px; width: 400px; font-size: 13px;"
          >
          <button @click="loadFolder()" :disabled="!folderPath">Load Folder</button>
        </div>
      </template>
      <template x-if="folder">
        <span class="folder-info">
          <span x-text="folder" style="max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
          <button @click="clearFolder()" title="Close folder" style="padding: 4px 8px;">✕</button>
        </span>
      </template>
      <span class="counter" x-text="files.length ? `${getCurrentIndex() + 1} / ${files.length}` : 'No images'"></span>
    </div>
    <div class="header-actions" style="margin-left: auto;">
      <button @click="openBash()" :disabled="Object.keys(marks).length === 0">⚡ Bash</button>
      <button @click="clearMarks()" :disabled="Object.keys(marks).length === 0">Clear Marks</button>
    </div>
  </header>

    <div class="preview-container" id="previewContainer">
    <div class="preview-strip" id="previewStrip">
      <template x-for="(file, idx) in files" :key="file.id">
        <div
          class="preview-thumb"
          :class="{
            pane1-current: idx === index1,
            pane2-current: idx === index2,
            marked: marks[file.id] && marks[file.id].length > 0,
            deleted: marks[file.id] && marks[file.id].includes(3)
          }"
          @click="focusedPane === 1 ? index1 = idx : index2 = idx; scrollPreview()"
        >
          <img
            :src="`/api/thumbnail/${encodeURIComponent(file.id)}`"
            :alt="file.name"
            loading="lazy"
          >
          <div class="preview-badges">
            <template x-for="mark in (marks[file.id] || [])" :key="mark">
              <span class="mark-badge" :style="`background: var(--mark-${mark})`" x-text="mark"></span>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <main>
    <div
      class="pane"
      :class="{ focused: focusedPane === 1 }"
      data-pane="1"
      @click="focusPane(1)"
    >
      <div class="pane-content">
        <img
          x-show="files.length > 0"
          :src="getPaneImageUrl(1)"
          @load="setupPanzoom(); updateMinScale(1)"
          draggable="false"
        >
      </div>
      <div class="pane-marks" x-show="marks[files[getPaneIndex(1)]?.id]?.length > 0">
        <template x-for="mark in (marks[files[getPaneIndex(1)]?.id] || [])" :key="mark">
          <span class="mark-badge-lg" :style="`background: var(--mark-${mark})`" x-text="mark"></span>
        </template>
      </div>
      <div class="pane-info" x-text="getPaneName(1)"></div>
    </div>

    <div
      class="pane"
      :class="{ focused: focusedPane === 2 }"
      data-pane="2"
      @click="focusPane(2)"
    >
      <div class="pane-content">
        <img
          x-show="files.length > 0"
          :src="getPaneImageUrl(2)"
          @load="setupPanzoom(); updateMinScale(2)"
          draggable="false"
        >
      </div>
      <div class="pane-marks" x-show="marks[files[getPaneIndex(2)]?.id]?.length > 0">
        <template x-for="mark in (marks[files[getPaneIndex(2)]?.id] || [])" :key="mark">
          <span class="mark-badge-lg" :style="`background: var(--mark-${mark})`" x-text="mark"></span>
        </template>
      </div>
      <div class="pane-info" x-text="getPaneName(2)"></div>
    </div>
  </main>

  <footer>
    <div class="marks-legend">
      <template x-for="i in 9" :key="i">
        <div class="mark-item">
          <span class="mark-key" x-text="i"></span>
          <span class="mark-count" x-text="getMarkCount(i)"></span>
        </div>
      </template>
    </div>
    <div class="shortcuts">
      Tab: Switch Pane | Space: Next | BkSp: Prev | Arrows: Pan | +/-: Zoom | 1-9: Mark | Esc: Reset
    </div>
  </footer>

  <div class="zoom-indicator" id="zoomIndicator">100%</div>

  <!-- Bash Modal -->
  <div class="modal" x-show="showBash" x-transition @click.self="showBash = false">
    <div class="modal-content">
      <h2>⚡ Bash Commands</h2>
      <template x-for="(cmd, mark) in bashCommands" :key="mark">
        <div class="command-group">
          <h3>Mark <span x-text="mark"></span> - <span x-text="markNames[mark]"></span> (<span x-text="bashFiles[mark]?.length || 0"></span> files)</h3>
          <div class="bash-command">
            <code x-text="cmd"></code>
            <button @click="copyCommand(cmd)">Copy</button>
          </div>
        </div>
      </template>
      <template x-if="Object.keys(bashCommands).length === 0">
        <p style="color: var(--text-dim);">No marked files</p>
      </template>
      <button @click="showBash = false" style="width: 100%; margin-top: 20px;">Close</button>
    </div>
  </div>

  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://unpkg.com/@panzoom/panzoom@4.6.1/dist/panzoom.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
